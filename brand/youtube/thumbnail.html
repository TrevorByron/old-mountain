<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Thumbnail · Old Mountain</title>
  <style>
    @font-face {
      font-family: 'Sunday April';
      src: url('../../fonts/sunday-april/sunday-april-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'awan-zaman';
      src: url('../../fonts/awan-zaman/awan-zaman-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'Chainprinter';
      src: url('../../fonts/chainprinter/chainprinter-regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0E1209;
      font-family: system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .canvas {
      width: 1280px;
      height: 720px;
      background: #0E1209;
      position: relative;
      overflow: hidden;
    }
    .bg-photo {
      position: absolute;
      inset: 0;
      /* SWAP this photo for each thumbnail */
      background-image: url('../../photos/safari/lions-paw/GGM08384-scaled.jpg');
      background-size: cover;
      background-position: center 30%;
      opacity: 0.65;
    }
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(14,18,9,0.95) 0%,
        rgba(14,18,9,0.6) 35%,
        rgba(14,18,9,0.15) 60%,
        rgba(14,18,9,0.08) 100%
      );
    }
    .bg-gradient-bottom {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(14,18,9,0.4) 0%, transparent 40%);
    }

    /* Logo — top right */
    .logo {
      position: absolute;
      top: 38px;
      right: 48px;
      height: 44px;
      opacity: 0.85;
    }

    /* Main text — left side */
    .content {
      position: absolute;
      top: 50%;
      left: 60px;
      transform: translateY(-50%);
      max-width: 560px;
    }
    .kicker {
      font-family: 'Chainprinter', monospace;
      font-size: 20px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #C4A96B;
      margin-bottom: 16px;
    }
    .headline {
      font-family: 'awan-zaman', serif;
      font-size: 100px;
      line-height: 0.9;
      color: #F0E6D3;
      margin-bottom: 24px;
    }
    .headline em {
      font-family: 'Sunday April', cursive;
      font-style: italic;
      color: #C4A96B;
    }
    .sub {
      font-size: 22px;
      color: rgba(240,230,211,0.55);
      line-height: 1.4;
    }

    /* Episode / series badge — bottom left */
    .badge {
      position: absolute;
      bottom: 44px;
      left: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .badge-line {
      width: 32px;
      height: 2px;
      background: #C4A96B;
    }
    .badge-text {
      font-family: 'Chainprinter', monospace;
      font-size: 15px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,230,211,0.38);
    }

    /* ── HOW TO CUSTOMIZE:
       1. Change .bg-photo background-image to any photo from ../../photos/
       2. Edit .kicker, .headline, .sub text below
       3. Edit .badge-text for series/episode info
       ── */
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-photo"></div>
    <div class="bg-gradient"></div>
    <div class="bg-gradient-bottom"></div>

    <img class="logo" src="../../logo/Logo.svg" alt="Old Mountain">

    <div class="content">
      <p class="kicker">Ngorongoro Crater</p>
      <h1 class="headline">Inside the<br><em>Crater.</em></h1>
      <p class="sub">Game drives at the world's largest intact volcanic caldera</p>
    </div>

    <div class="badge">
      <div class="badge-line"></div>
      <p class="badge-text">Tanzania 2027 Series</p>
    </div>
  </div>
</body>
</html>
