<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Banner · Old Mountain</title>
  <style>
    @font-face {
      font-family: 'Sunday April';
      src: url('../../fonts/sunday-april/sunday-april-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'awan-zaman';
      src: url('../../fonts/awan-zaman/awan-zaman-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'Chainprinter';
      src: url('../../fonts/chainprinter/chainprinter-regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 2560px;
      height: 1440px;
      overflow: hidden;
      background: #0E1209;
      font-family: system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .canvas {
      width: 2560px;
      height: 1440px;
      background: #0E1209;
      position: relative;
      overflow: hidden;
    }

    /* Full background photo (visible on large screens/TVs) */
    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('../../photos/hero/tarangiri27.jpg');
      background-size: cover;
      background-position: center 45%;
      opacity: 0.35;
    }
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(14,18,9,0.98) 0%,
        rgba(14,18,9,0.7) 35%,
        rgba(14,18,9,0.35) 60%,
        rgba(14,18,9,0.6) 80%,
        rgba(14,18,9,0.95) 100%
      );
    }
    .bg-gradient-v {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(14,18,9,0.6) 0%,
        transparent 30%,
        transparent 70%,
        rgba(14,18,9,0.6) 100%
      );
    }

    /*
      YouTube display zones:
      - TV:      full 2560×1440
      - Desktop: centered 1546×423px
      - Mobile:  centered 1546×423px (but narrower)
      Safe zone: center 1546×423px (x: 507 to 2053, y: 509 to 931)
    */

    /* Safe zone indicator (remove before export) */
    .safe-zone-guide {
      position: absolute;
      left: 507px;
      top: 509px;
      width: 1546px;
      height: 423px;
      border: 2px dashed rgba(196,169,107,0.25);
      pointer-events: none;
    }
    .safe-zone-label {
      position: absolute;
      top: -22px;
      left: 0;
      font-family: 'Chainprinter', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(196,169,107,0.35);
    }

    /* Main centered content — lives within the safe zone */
    .center-content {
      position: absolute;
      left: 507px;
      top: 509px;
      width: 1546px;
      height: 423px;
      display: flex;
      align-items: center;
      gap: 64px;
    }
    .logo-wrap img {
      height: 130px;
    }
    .text-wrap {
      flex: 1;
    }
    .text-kicker {
      font-family: 'Chainprinter', monospace;
      font-size: 18px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #C4A96B;
      margin-bottom: 14px;
    }
    .text-headline {
      font-family: 'awan-zaman', serif;
      font-size: 96px;
      line-height: 0.9;
      color: #F0E6D3;
    }
    .text-headline em {
      font-family: 'Sunday April', cursive;
      font-style: italic;
      color: #C4A96B;
    }
    .right-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      padding-right: 8px;
    }
    .right-tag {
      font-family: 'Chainprinter', monospace;
      font-size: 16px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,230,211,0.38);
      text-align: right;
    }
    .right-divider {
      width: 1px;
      height: 48px;
      background: rgba(196,169,107,0.25);
    }

    /* Wide background decor elements (visible on TV only) */
    .side-photo-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 480px;
      height: 100%;
      background-image: url('../../photos/safari/esirai-camp/ElizaPowell@EsiraiMarch22_2732.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.25;
      mask-image: linear-gradient(to right, rgba(0,0,0,0.6), transparent);
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.6), transparent);
    }
    .side-photo-right {
      position: absolute;
      right: 0;
      top: 0;
      width: 480px;
      height: 100%;
      background-image: url('../../photos/safari/lions-paw/GGM08384-scaled.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.25;
      mask-image: linear-gradient(to left, rgba(0,0,0,0.6), transparent);
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.6), transparent);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="side-photo-left"></div>
    <div class="side-photo-right"></div>
    <div class="bg-photo"></div>
    <div class="bg-gradient"></div>
    <div class="bg-gradient-v"></div>

    <!-- Safe zone guide — remove/hide before final export -->
    <div class="safe-zone-guide">
      <span class="safe-zone-label">Desktop safe zone (1546×423)</span>
    </div>

    <!-- Content within safe zone -->
    <div class="center-content">
      <div class="logo-wrap">
        <img src="../../logo/Logo.svg" alt="Old Mountain">
      </div>
      <div class="text-wrap">
        <p class="text-kicker">Old Mountain Tours &amp; Explorations</p>
        <h1 class="text-headline">Tanzania<br><em>Beautiful.</em></h1>
      </div>
      <div class="right-col">
        <p class="right-tag">Est. 2009</p>
        <div class="right-divider"></div>
        <p class="right-tag">East Africa</p>
      </div>
    </div>
  </div>
</body>
</html>
