<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Story · Old Mountain</title>
  <style>
    @font-face {
      font-family: 'Sunday April';
      src: url('../../fonts/sunday-april/sunday-april-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'awan-zaman';
      src: url('../../fonts/awan-zaman/awan-zaman-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'Chainprinter';
      src: url('../../fonts/chainprinter/chainprinter-regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .canvas {
      width: 1080px;
      height: 1920px;
      background: #0E1209;
      position: relative;
      overflow: hidden;
    }
    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('../../photos/about/road.jpg');
      background-size: cover;
      background-position: center 40%;
      opacity: 0.55;
    }
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(14, 18, 9, 0.7) 0%,
        rgba(14, 18, 9, 0.1) 30%,
        rgba(14, 18, 9, 0.1) 60%,
        rgba(14, 18, 9, 0.95) 100%
      );
    }
    .top-bar {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { height: 50px; opacity: 0.9; }
    .date-badge {
      font-family: 'Chainprinter', monospace;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,230,211,0.45);
      background: rgba(14,18,9,0.6);
      border: 1px solid rgba(240,230,211,0.12);
      padding: 10px 18px;
      border-radius: 2px;
    }
    .center-content {
      position: absolute;
      top: 50%;
      left: 80px;
      right: 80px;
      transform: translateY(-50%);
      text-align: center;
    }
    .center-kicker {
      font-family: 'Chainprinter', monospace;
      font-size: 19px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #C4A96B;
      margin-bottom: 28px;
    }
    .center-headline {
      font-family: 'awan-zaman', serif;
      font-size: 120px;
      line-height: 0.92;
      color: #F0E6D3;
    }
    .center-headline em {
      font-family: 'Sunday April', cursive;
      font-style: italic;
      color: #C4A96B;
      display: block;
    }
    .bottom-content {
      position: absolute;
      bottom: 140px;
      left: 80px;
      right: 80px;
    }
    .bottom-rule {
      width: 100%;
      height: 1px;
      background: rgba(240,230,211,0.1);
      margin-bottom: 44px;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 56px;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'awan-zaman', serif;
      font-size: 72px;
      color: #C4A96B;
      line-height: 1;
    }
    .stat-label {
      font-family: 'Chainprinter', monospace;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,230,211,0.38);
      margin-top: 8px;
    }
    .cta {
      display: block;
      text-align: center;
      font-family: 'Chainprinter', monospace;
      font-size: 18px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0E1209;
      background: #C4A96B;
      padding: 28px 48px;
      border-radius: 2px;
    }
    .swipe-hint {
      position: absolute;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Chainprinter', monospace;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,230,211,0.28);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-photo"></div>
    <div class="bg-gradient"></div>

    <div class="top-bar">
      <img class="logo" src="../../logo/Logo.svg" alt="Old Mountain">
      <span class="date-badge">Feb · Jul 2027</span>
    </div>

    <div class="center-content">
      <p class="center-kicker">The 2027 Group Expedition</p>
      <h1 class="center-headline">Tanzania<br><em>Beautiful.</em></h1>
    </div>

    <div class="bottom-content">
      <div class="bottom-rule"></div>
      <div class="stats-row">
        <div class="stat">
          <p class="stat-num">11</p>
          <p class="stat-label">Days</p>
        </div>
        <div class="stat">
          <p class="stat-num">4</p>
          <p class="stat-label">Regions</p>
        </div>
        <div class="stat">
          <p class="stat-num">12</p>
          <p class="stat-label">Seats</p>
        </div>
      </div>
      <a class="cta" href="#">Save Your 2027 Spot</a>
    </div>

    <p class="swipe-hint">↑ Swipe up · oldmountaintours.com</p>
  </div>
</body>
</html>
