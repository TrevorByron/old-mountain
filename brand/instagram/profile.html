<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Profile · Old Mountain</title>
  <style>
    @font-face {
      font-family: 'awan-zaman';
      src: url('../../fonts/awan-zaman/awan-zaman-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'Chainprinter';
      src: url('../../fonts/chainprinter/chainprinter-regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1000px;
      height: 1000px;
      overflow: hidden;
      background: #0E1209;
    }
    .canvas {
      width: 1000px;
      height: 1000px;
      background: #0E1209;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .bg-ring {
      position: absolute;
      width: 860px;
      height: 860px;
      border-radius: 50%;
      border: 1px solid rgba(240,230,211,0.06);
    }
    .bg-ring-2 {
      width: 680px;
      height: 680px;
      border-color: rgba(196,169,107,0.08);
    }
    .logo {
      width: 420px;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-ring"></div>
    <div class="bg-ring bg-ring-2"></div>
    <img class="logo" src="../../logo/Logo.svg" alt="Old Mountain">
  </div>
</body>
</html>
