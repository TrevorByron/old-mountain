<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Post · Old Mountain</title>
  <style>
    @font-face {
      font-family: 'Sunday April';
      src: url('../../fonts/sunday-april/sunday-april-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'awan-zaman';
      src: url('../../fonts/awan-zaman/awan-zaman-regular.woff') format('woff');
    }
    @font-face {
      font-family: 'Chainprinter';
      src: url('../../fonts/chainprinter/chainprinter-regular.woff') format('woff');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .canvas {
      width: 1080px;
      height: 1080px;
      background: #0E1209;
      position: relative;
      overflow: hidden;
    }
    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('../../photos/safari/esirai-camp/ElizaPowell@EsiraiMarch22_2732.jpg');
      background-size: cover;
      background-position: center 35%;
      opacity: 0.6;
    }
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(14, 18, 9, 0.96) 0%,
        rgba(14, 18, 9, 0.55) 40%,
        rgba(14, 18, 9, 0.15) 100%
      );
    }
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 64px 72px;
    }
    .logo {
      position: absolute;
      top: 52px;
      left: 72px;
      height: 42px;
      opacity: 0.9;
    }
    .kicker {
      font-family: 'Chainprinter', monospace;
      font-size: 18px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C4A96B;
      margin-bottom: 18px;
    }
    .headline {
      font-family: 'awan-zaman', serif;
      font-size: 90px;
      line-height: 0.92;
      color: #F0E6D3;
      margin-bottom: 24px;
    }
    .headline em {
      font-family: 'Sunday April', cursive;
      font-style: italic;
      color: #C4A96B;
    }
    .body {
      font-size: 22px;
      line-height: 1.6;
      color: rgba(240, 230, 211, 0.62);
      max-width: 680px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(196, 169, 107, 0.5);
      margin-bottom: 20px;
    }

    /* ── SWAP PHOTO: change background-image url above ── */
    /* ── SWAP TEXT: edit kicker, headline, body below   ── */
  </style>
</head>
<body>
  <div class="canvas">
    <div class="bg-photo"></div>
    <div class="bg-gradient"></div>
    <img class="logo" src="../../logo/Logo.svg" alt="Old Mountain">
    <div class="content">
      <p class="kicker">Tanzania · 2027</p>
      <h1 class="headline">Eleven days<br>in the <em>wild.</em></h1>
      <div class="divider"></div>
      <p class="body">From the Hadzabe to the Serengeti. Two departure windows. 12 seats.</p>
    </div>
  </div>
</body>
</html>
